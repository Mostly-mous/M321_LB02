<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>M321-LB02 Realtime Chat-App</title>
</head>
<body>
    <div class="container">
        <!-- Login-Area -->
        <div id="login-screen" class="screen">
            <div class="login-box">
                <h1>M321-LB02 Realtime Chat App</h1>
                <p>Welcome! Please enter your name to start chatting!</p>
                <form id="login-form">
                    <input type="text" id="username-input" placeholder="Enter your username..." required maxlength="20">
                    <button type="submit" id="login-submit" class="btn">Enter chat!</button>
                </form>
            </div>
        </div>

        <!-- Chat-Area -->
        <div id="chat-screen" class="screen hidden">
            <header class="chat-header">
                <div class="header-left">
                    <h2>Chatroom</h2>
                </div>
                <div class="header-right">
                    <span class="connection-status" id="connection-status">
                        <span class="staus-dot"></span>
                        Connected
                    </span>
                    <div class="username-edit">
                        <input type="text" id="edit-username" placeholder="Enter new username..." maxlength="20">
                        <button id="update-username" class="btn-small">Edit</button>
                    </div>
                </div>
            </header>

            <div class="chat-main">
                <aside class="sidebar">
                    <h3>Active Users</h3>
                    <ul id="user-list">
                        <li class="loading"></li>
                    </ul>
                </aside>

                <main class="messages-area">
                    <div id="messages" class="messages">
                        <!-- Messages will be displayed here -->
                    </div>
                </main>
            </div>

            <footer class="chat-input">
               <form id="message-form">
                 <input type="text" id="message-input" placeholder="Enter your message..." maxlength="500">
                 <button type="submit" id="send-message" class="btn-send">Send Message</button>
               </form>
            </footer>
        </div>
    </div>

    <!-- Script for Frontend -->
    <script src="client.js"></script>
</body>
</html>
